<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="F&O Tracker">
  <meta name="description" content="NSE Futures & Options EOD Data Tracker by SDK Fintech">
  <title>NSE F&amp;O Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
/* в”Җв”Җ CSS Variables в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
:root {
  --bg:      #0d1b2a;
  --panel:   #1a2e42;
  --panel2:  #1f3850;
  --fg:      #d0e8f8;
  --fg2:     #7ca8c8;
  --accent:  #1a7abf;
  --green:   #22c55e;
  --red:     #ef4444;
  --amber:   #f59e0b;
  --purple:  #a855f7;
  --blue:    #3b82f6;
  --border:  #2a3f54;
  --shadow:  rgba(0,0,0,0.4);
  --tab-h:   56px;
  --head-h:  48px;
  --radius:  8px;
}
body.light {
  --bg:      #f0f4f8;
  --panel:   #ffffff;
  --panel2:  #e8f0f8;
  --fg:      #1a2e42;
  --fg2:     #4a6a8a;
  --border:  #c8d8e8;
  --shadow:  rgba(0,0,0,0.1);
}

/* в”Җв”Җ Reset в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  font-size: 13px;
  -webkit-tap-highlight-color: transparent;
}

/* в”Җв”Җ Header в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#header {
  height: var(--head-h);
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  box-shadow: 0 2px 8px var(--shadow);
}
#header h1 { font-size: 15px; font-weight: 700; color: var(--fg); flex: 1; }
#header h1 span { color: var(--accent); }
#data-ts { font-size: 11px; color: var(--fg2); white-space: nowrap; }
#theme-btn {
  background: none; border: none; cursor: pointer;
  color: var(--fg2); font-size: 16px; padding: 4px;
}
#refresh-btn {
  background: var(--accent); border: none; cursor: pointer;
  color: #fff; font-size: 11px; padding: 4px 10px;
  border-radius: 4px; font-weight: 600;
}

/* в”Җв”Җ Offline banner в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#offline-banner {
  display: none;
  background: var(--amber);
  color: #000;
  text-align: center;
  font-size: 11px;
  padding: 4px;
  position: fixed;
  top: var(--head-h);
  left: 0; right: 0;
  z-index: 99;
}
#offline-banner.show { display: block; }

/* в”Җв”Җ Main content area в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#content {
  position: fixed;
  top: var(--head-h);
  bottom: var(--tab-h);
  left: 0; right: 0;
  overflow: hidden;
}
#content.has-banner { top: calc(var(--head-h) + 24px); }

/* в”Җв”Җ Tab pages в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.page {
  display: none;
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px;
  -webkit-overflow-scrolling: touch;
}
.page.active { display: block; }

/* в”Җв”Җ Bottom tab bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--fg2);
  font-size: 10px;
  padding: 4px 2px;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn .icon { font-size: 18px; line-height: 1; }
.tab-btn.active { color: var(--accent); }
.tab-btn.active .icon { transform: scale(1.1); }

/* в”Җв”Җ Cards & Tables в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 8px;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--fg2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

/* Summary cards row */
.summary-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.summary-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  text-align: center;
}
.summary-card .val {
  font-size: 18px;
  font-weight: 700;
  color: var(--fg);
}
.summary-card .lbl { font-size: 10px; color: var(--fg2); margin-top: 2px; }
.summary-card .chg { font-size: 12px; font-weight: 600; margin-top: 2px; }

/* Table */
.tbl-wrap { overflow-x: auto; border-radius: var(--radius); }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  background: var(--panel2);
  color: var(--fg2);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  padding: 6px 8px;
  text-align: left;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
th:hover { color: var(--fg); }
td {
  padding: 7px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  color: var(--fg);
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
tr.lb td { color: #22c55e; font-weight: 600; }
tr.sb td { color: #ef4444; font-weight: 600; }
tr.lu td { color: #f59e0b; }
tr.sc td { color: #a855f7; }

/* Signal badge */
.sig {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
}
.sig-lb { background: #064e1a; color: #22c55e; }
.sig-sb { background: #4e0606; color: #ef4444; }
.sig-lu { background: #4e3006; color: #f59e0b; }
.sig-sc { background: #2e0650; color: #a855f7; }

/* в”Җв”Җ Colour helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.up   { color: var(--green); }
.down { color: var(--red); }
.neu  { color: var(--fg2); }
.bold { font-weight: 700; }

/* в”Җв”Җ Section header в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.sec-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 10px 0 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--fg);
}
.sec-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* в”Җв”Җ Filter bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  align-items: center;
}
.filter-bar input, .filter-bar select {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--fg);
  border-radius: 4px;
  padding: 5px 8px;
  font-size: 12px;
  outline: none;
}
.filter-bar input { flex: 1; min-width: 120px; }
.filter-bar select { min-width: 110px; }

/* в”Җв”Җ OI Heatmap tiles в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#heatmap-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 4px;
  margin-top: 8px;
}
.hm-tile {
  border-radius: 6px;
  padding: 8px 6px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.1s;
  min-height: 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.hm-tile:active { transform: scale(0.96); }
.hm-tile .hm-sym { font-size: 11px; font-weight: 700; }
.hm-tile .hm-ltp { font-size: 13px; font-weight: 700; }
.hm-tile .hm-pct { font-size: 10px; }
.hm-tile .hm-oi  { font-size: 9px; opacity: 0.85; }
.hm-tile .hm-sig { font-size: 9px; font-weight: 700; margin-top: 2px; }

/* в”Җв”Җ Rollover progress bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.roll-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 3px;
  overflow: hidden;
}
.roll-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
  transition: width 0.3s;
}

/* в”Җв”Җ Bottom sheet в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#sheet-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
}
#sheet-overlay.show { display: block; }
#bottom-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-radius: 16px 16px 0 0;
  padding: 16px;
  max-height: 70vh;
  overflow-y: auto;
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.25s ease;
}
#bottom-sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 12px;
}
.sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.sheet-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.sheet-row:last-child { border-bottom: none; }
.sheet-row .lbl { color: var(--fg2); }
.sheet-row .val { font-weight: 600; }

/* в”Җв”Җ Skeleton loader в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.skeleton {
  background: linear-gradient(90deg, var(--panel) 25%, var(--panel2) 50%, var(--panel) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
  height: 14px;
  margin-bottom: 6px;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* в”Җв”Җ Toast в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
#toast {
  position: fixed;
  bottom: calc(var(--tab-h) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--panel2);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 300;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* в”Җв”Җ Error state в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  gap: 12px;
  color: var(--fg2);
  text-align: center;
}
.error-state .err-icon { font-size: 36px; }
.retry-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

/* в”Җв”Җ Tabbar overflow scroll (7 tabs) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */

/* в”Җв”Җ Scrollbar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */

/* в”Җв”Җ Responsive в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */

  <script>
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   app.js вҖ” NSE F&O Tracker PWA вҖ” SDK Fintech
   Main: data load, router, tab nav, utilities
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

// в”Җв”Җ Config вҖ” CHANGE THIS URL to your GitHub raw JSON URL в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const DATA_URL = './fo_snapshot_v3.json';
const REFRESH_MS = 5 * 60 * 1000;  // 5 min

// в”Җв”Җ Global state в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
window.FO = {
  data:      null,
  loading:   false,
  lastFetch: null,
  offline:   false,
  tab:       'pulse',
};

// в”Җв”Җ DOM refs в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const $ = id => document.getElementById(id);

// в”Җв”Җ Register service worker в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'BG_REFRESH') loadData();
  });
}

// в”Җв”Җ Data loader в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadData(force = false) {
  if (FO.loading) return;
  FO.loading = true;
  showPTR(true);

  try {
    const url = force ? DATA_URL + '?t=' + Date.now() : DATA_URL;
    const resp = await fetch(url, { cache: force ? 'no-cache' : 'default' });

    if (resp.ok) {
      FO.data     = await resp.json();
      FO.lastFetch = new Date();
      FO.offline  = false;
      setOfflineBanner(false);
      updateTimestamp();
      renderCurrentTab();
      showToast('Data updated В· ' + fmt_time(FO.lastFetch));
    } else {
      throw new Error('HTTP ' + resp.status);
    }
  } catch (err) {
    // Try cache
    try {
      const cached = await caches.match(DATA_URL);
      if (cached) {
        FO.data    = await cached.json();
        FO.offline = true;
        setOfflineBanner(true, FO.data?.meta?.date_fmt);
        updateTimestamp();
        renderCurrentTab();
      } else {
        showError();
      }
    } catch {
      showError();
    }
  } finally {
    FO.loading = false;
    showPTR(false);
  }
}

// в”Җв”Җ Tab router в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TAB_RENDERERS = {
  pulse:    () => window.renderPulse    && renderPulse(FO.data),
  futures:  () => window.renderFutures  && renderFutures(FO.data),
  oi:       () => window.renderOI       && renderOI(FO.data),
  rollover: () => window.renderRollover && renderRollover(FO.data),
  basis:    () => window.renderBasis    && renderBasis(FO.data),
  scanner:  () => window.renderScanner  && renderScanner(FO.data),
  screener: () => window.renderScreener && renderScreener(FO.data),
};

function switchTab(name) {
  FO.tab = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const pg = $('page-' + name);
  if (pg) pg.classList.add('active');
  const btn = $('tab-' + name);
  if (btn) btn.classList.add('active');
  renderCurrentTab();
}

function renderCurrentTab() {
  if (!FO.data) return;
  const fn = TAB_RENDERERS[FO.tab];
  if (fn) try { fn(); } catch(e) { console.error('Render error:', e); }
}

// в”Җв”Җ Swipe navigation в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TABS = ['pulse','futures','oi','rollover','basis','scanner','screener'];
let touchX0 = 0;
document.addEventListener('touchstart', e => { touchX0 = e.touches[0].clientX; }, {passive: true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX0;
  if (Math.abs(dx) < 60) return;
  const idx = TABS.indexOf(FO.tab);
  if (dx < 0 && idx < TABS.length - 1) switchTab(TABS[idx + 1]);
  if (dx > 0 && idx > 0)               switchTab(TABS[idx - 1]);
}, {passive: true});

// в”Җв”Җ Pull-to-refresh в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let ptY0 = 0, pulling = false;
document.addEventListener('touchstart', e => {
  const pg = document.querySelector('.page.active');
  if (pg && pg.scrollTop === 0) { ptY0 = e.touches[0].clientY; pulling = true; }
}, {passive: true});
document.addEventListener('touchend', e => {
  if (pulling && e.changedTouches[0].clientY - ptY0 > 60) loadData(true);
  pulling = false;
}, {passive: true});

// в”Җв”Җ Bottom sheet в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function openSheet(html, title) {
  const overlay = $('sheet-overlay');
  const sheet   = $('bottom-sheet');
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${title}</div>
    ${html}
  `;
  overlay.classList.add('show');
  requestAnimationFrame(() => sheet.classList.add('open'));
}
function closeSheet() {
  $('sheet-overlay').classList.remove('show');
  $('bottom-sheet').classList.remove('open');
}
document.getElementById('sheet-overlay').addEventListener('click', closeSheet);

// в”Җв”Җ Helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function fmt_inr(v) {
  if (v == null || isNaN(v)) return 'вҖ”';
  const n = parseFloat(v);
  if (Math.abs(n) >= 1e7)  return 'вӮ№' + (n/1e7).toFixed(2) + 'Cr';
  if (Math.abs(n) >= 1e5)  return 'вӮ№' + (n/1e5).toFixed(2) + 'L';
  return 'вӮ№' + n.toLocaleString('en-IN', {maximumFractionDigits: 2});
}
function fmt_num(v, dec=2) {
  if (v == null || isNaN(v)) return 'вҖ”';
  return parseFloat(v).toFixed(dec);
}
function fmt_pct(v, dec=2) {
  if (v == null || isNaN(v)) return 'вҖ”';
  const n = parseFloat(v);
  const cls = n > 0 ? 'up' : n < 0 ? 'down' : 'neu';
  const sign = n > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${n.toFixed(dec)}%</span>`;
}
function fmt_oi(v) {
  if (v == null) return 'вҖ”';
  const n = parseInt(v);
  if (n >= 1e7) return (n/1e7).toFixed(2) + 'Cr';
  if (n >= 1e5) return (n/1e5).toFixed(2) + 'L';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}
function fmt_time(d) {
  return d.toTimeString().slice(0,5);
}
function sig_badge(s) {
  if (!s) return '';
  const map = {LB:'lb',SB:'sb',LU:'lu',SC:'sc'};
  return `<span class="sig sig-${map[s]||''}">${s}</span>`;
}
function price_cls(v) { return parseFloat(v) > 0 ? 'up' : parseFloat(v) < 0 ? 'down' : 'neu'; }
function row_cls(sig) { return sig ? sig.toLowerCase() : ''; }
function ban_badge(r) {
  return r?.ban_status === 'ban' ? '<span class="ban-badge">BAN</span>' : '';
}
window.fmt_inr   = fmt_inr;
window.fmt_num   = fmt_num;
window.fmt_pct   = fmt_pct;
window.fmt_oi    = fmt_oi;
window.sig_badge = sig_badge;
window.price_cls = price_cls;
window.row_cls   = row_cls;

// в”Җв”Җ Sort table helper в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function makeSortable(tableId) {
  const tbl = document.getElementById(tableId);
  if (!tbl) return;
  let sortCol = -1, sortAsc = true;
  tbl.querySelectorAll('th').forEach((th, i) => {
    th.addEventListener('click', () => {
      const tbody = tbl.querySelector('tbody');
      const rows  = Array.from(tbody.querySelectorAll('tr'));
      if (sortCol === i) sortAsc = !sortAsc; else { sortCol = i; sortAsc = true; }
      rows.sort((a, b) => {
        const av = a.cells[i]?.innerText.replace(/[вӮ№%+,]/g,'').trim() || '';
        const bv = b.cells[i]?.innerText.replace(/[вӮ№%+,]/g,'').trim() || '';
        const an = parseFloat(av), bn = parseFloat(bv);
        if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
        return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      });
      rows.forEach(r => tbody.appendChild(r));
      tbl.querySelectorAll('th').forEach((h,j) => {
        h.textContent = h.textContent.replace(' вҶ‘','').replace(' вҶ“','');
        if (j === i) h.textContent += sortAsc ? ' вҶ‘' : ' вҶ“';
      });
    });
  });
}
window.makeSortable = makeSortable;

function renderHeatmap(rows, mode='rank50') {
  const grid=document.getElementById('heatmap-grid'); if(!grid) return;
  function sc(r){return (parseFloat(r.chg_pct||0)*0.5)+(parseFloat(r.oi_chg_pct||0)*0.5);}
  const scored=[...rows].map(r=>({...r,_sc:sc(r)})).sort((a,b)=>b._sc-a._sc);
  let heat;
  if(mode==='all') heat=scored;
  else if(mode==='g25l25'){
    const byP=[...rows].sort((a,b)=>(b.chg_pct||0)-(a.chg_pct||0));
    heat=[...byP.slice(0,25),...byP.slice(-25).reverse()];
  } else heat=scored.slice(0,50);

  function ts(s,p){
    const a=Math.abs(s);
    if(a<1) return {bg:'#1a1f2e',fg:p>=0?'#22c55e':'#ef4444',brd:'#2a3040'};
    if(s>=5) return {bg:'#004d00',fg:'#fff',brd:'#006600'};
    if(s>=3) return {bg:'#006600',fg:'#fff',brd:'#008800'};
    if(s>=1) return {bg:'#1a8c1a',fg:'#fff',brd:'#22aa22'};
    if(s>=-3) return {bg:'#991a1a',fg:'#fff',brd:'#bb2222'};
    if(s>=-5) return {bg:'#cc0000',fg:'#fff',brd:'#dd1111'};
    return {bg:'#800000',fg:'#fff',brd:'#990000'};
  }
  const SC2={LB:'#00e676',SB:'#ff5252',LU:'#ffab40',SC:'#ce93d8'};
  grid.innerHTML=heat.map((r,i)=>{
    const s=r._sc||sc(r),p=parseFloat(r.chg_pct||0),o=parseFloat(r.oi_chg_pct||0);
    const l=parseFloat(r.ltp||0),{bg,fg,brd}=ts(s,p),top=i<10;
    const sig=r.trend||r.signal||'';
    const rb=top?`<div style="position:absolute;top:3px;left:3px;background:#1a7abf;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px">#${i+1}</div>`:'';
    const sc2=SC2[sig]||'';
    const sb2=sig&&sc2?`<div style="position:absolute;bottom:3px;left:3px;background:${sc2};color:#000;font-size:${top?9:7}px;font-weight:700;padding:1px ${top?6:4}px;border-radius:3px">${sig}</div>`:'';
    return `<div class="hm-tile" style="background:${bg};border:1px solid ${brd};min-height:${top?110:52}px;position:relative;color:${fg}" onclick='showSymbolSheet(${JSON.stringify({...r,signal:sig,lot:r.lot_size})})'>
      ${rb}
      <div style="font-size:11px;font-weight:700;color:${fg}">${r.symbol}</div>
      <div style="font-size:${top?14:10}px;font-weight:700;color:${fg}">вӮ№${l>=10000?l.toFixed(0):l.toFixed(1)}</div>
      <div style="font-size:${top?10:8}px;color:${fg}">${p>=0?'+':''}${p.toFixed(2)}%</div>
      <div style="font-size:8px;color:${o>=0?'#00e676':'#ff5252'}">OI ${o>=0?'+':''}${o.toFixed(1)}%</div>
      ${sb2}</div>`;
  }).join('');
}

  function apply(){

     confidence, basis_pct, pattern, trend, expiry, lot_size, days_to_exp
   Falls back gracefully to futures[] if strategy_scanner is absent.
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let _scanFilter = '';
let _scanSort   = 'conf_desc';
let _scanDir    = '';

function renderScanner(data) {
  const pg = document.getElementById('page-scanner');
  if (!data || !pg) return;

  /* в”Җв”Җ source: prefer strategy_scanner[], fall back to deriving from futures в”Җв”Җ */
  let rows = [];
  if (data.strategy_scanner && data.strategy_scanner.length) {
    rows = data.strategy_scanner;
  } else {
    /* Derive virtual strategy cards from futures[] near-expiry */
    rows = (data.futures || [])
      .filter(r => r.expiry_rank === 1)
      .map(r => {
        const p = parseFloat(r.chg_pct  || 0);
        const o = parseFloat(r.oi_chg_pct || 0);
        const bp = parseFloat(r.basis_pct || 0);
        let strategy = 'Long Futures', direction = 'bullish';
        if (r.trend === 'SB' || r.trend === 'LU') { strategy = 'Short Futures'; direction = 'bearish'; }
        if (r.trend === 'SC') { strategy = 'Bull Spread'; direction = 'bullish'; }
        const conf = Math.min(100, Math.abs(p) * 10 + Math.abs(o) * 5 + 20);
        const ltp  = parseFloat(r.ltp || 0);
        const sl_mult   = direction === 'bullish' ? 0.97 : 1.03;
        const tgt_mult  = direction === 'bullish' ? 1.05 : 0.95;
        const rr = ltp > 0
          ? Math.abs((ltp * tgt_mult - ltp) / (ltp - ltp * sl_mult)).toFixed(1)
          : 'вҖ”';
        return {
          ...r,
          strategy, direction,
          entry:        ltp,
          target:       +(ltp * tgt_mult).toFixed(2),
          sl:           +(ltp * sl_mult).toFixed(2),
          risk_reward:  rr,
          confidence:   +conf.toFixed(0),
        };
      })
      .filter(r => r.entry > 0);
  }

  if (!rows.length) {
    pg.innerHTML = `<div class="error-state"><div class="err-icon">рҹҺҜ</div>
      <div>No strategy data in snapshot</div>
      <div style="font-size:11px;color:var(--fg2);margin-top:6px">Ensure strategy_scanner[] is populated in desktop app</div></div>`;
    return;
  }

  const bullCount = rows.filter(r => (r.direction||'').toLowerCase().includes('bull')).length;
  const bearCount = rows.filter(r => (r.direction||'').toLowerCase().includes('bear')).length;
  const neuCount  = rows.length - bullCount - bearCount;

  pg.innerHTML = `
    <!-- Summary strip -->
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div class="card" style="flex:1;text-align:center;padding:8px;border-color:#064e1a">
        <div style="font-size:22px;font-weight:700;color:var(--green)">${bullCount}</div>
        <div style="font-size:10px;color:var(--fg2)">Bullish</div>
      </div>
      <div class="card" style="flex:1;text-align:center;padding:8px">
        <div style="font-size:22px;font-weight:700;color:var(--fg2)">${neuCount}</div>
        <div style="font-size:10px;color:var(--fg2)">Neutral</div>
      </div>
      <div class="card" style="flex:1;text-align:center;padding:8px;border-color:#4e0606">
        <div style="font-size:22px;font-weight:700;color:var(--red)">${bearCount}</div>
        <div style="font-size:10px;color:var(--fg2)">Bearish</div>
      </div>
    </div>
    <!-- Filters -->
    <div class="filter-bar">
      <input id="sc-search" type="search" placeholder="SymbolвҖҰ" value="${_scanFilter}">
      <select id="sc-dir">
        <option value="">All Directions</option>
        <option value="bullish"${_scanDir==='bullish'?' selected':''}>Bullish</option>
        <option value="bearish"${_scanDir==='bearish'?' selected':''}>Bearish</option>
        <option value="neutral"${_scanDir==='neutral'?' selected':''}>Neutral</option>
      </select>
      <select id="sc-sort">
        <option value="conf_desc"${_scanSort==='conf_desc'?' selected':''}>Conf% вҶ“</option>
        <option value="rr_desc"${_scanSort==='rr_desc'?' selected':''}>R:R вҶ“</option>
        <option value="sym_asc"${_scanSort==='sym_asc'?' selected':''}>Symbol AвҖ“Z</option>
      </select>
    </div>
    <div id="sc-count" style="font-size:11px;color:var(--fg2);margin-bottom:6px"></div>
    <div id="sc-cards"></div>`;

  function apply() {
    _scanFilter = document.getElementById('sc-search').value.trim().toUpperCase();
    _scanDir    = document.getElementById('sc-dir').value;
    _scanSort   = document.getElementById('sc-sort').value;
    let list = rows.filter(r => {
      if (_scanFilter && !(r.symbol||'').includes(_scanFilter)) return false;
      if (_scanDir && !(r.direction||'').toLowerCase().includes(_scanDir)) return false;
      return true;
    });
    list.sort((a,b) => {
      if (_scanSort === 'rr_desc') return parseFloat(b.risk_reward||0) - parseFloat(a.risk_reward||0);
      if (_scanSort === 'sym_asc') return (a.symbol||'').localeCompare(b.symbol||'');
      return parseFloat(b.confidence||0) - parseFloat(a.confidence||0);
    });
    document.getElementById('sc-count').textContent = `${list.length} strategies`;
    document.getElementById('sc-cards').innerHTML = list.map(r => {
      const dir = (r.direction||'neutral').toLowerCase();
      const cls = dir.includes('bull') ? 'strat-bullish' : dir.includes('bear') ? 'strat-bearish' : 'strat-neutral';
      const label = dir.includes('bull') ? 'в–І Bullish' : dir.includes('bear') ? 'в–ј Bearish' : 'в—Ҹ Neutral';
      const conf = parseFloat(r.confidence || 0);
      const confCl = conf >= 70 ? 'var(--green)' : conf >= 45 ? 'var(--accent)' : 'var(--amber)';
      return `<div class="strat-card" onclick='showStratSheet(${JSON.stringify(r)})'>
        <div class="strat-header">
          <div>
            <div class="strat-sym">${ban_badge(r)}${r.symbol}</div>
            <div style="font-size:11px;color:var(--fg2);margin-top:2px">${r.strategy||'вҖ”'}</div>
          </div>
          <div style="text-align:right">
            <span class="strat-type ${cls}">${label}</span>
            <div style="font-size:11px;margin-top:4px;color:${confCl};font-weight:700">${conf.toFixed(0)}% conf</div>
          </div>
        </div>
        <div class="strat-row">
          <span>Entry <strong>вӮ№${parseFloat(r.entry||0).toFixed(2)}</strong></span>
          <span>Target <strong style="color:var(--green)">вӮ№${parseFloat(r.target||0).toFixed(2)}</strong></span>
          <span>SL <strong style="color:var(--red)">вӮ№${parseFloat(r.sl||0).toFixed(2)}</strong></span>
          <span>R:R <strong>${r.risk_reward||'вҖ”'}</strong></span>
          <span>Exp <strong>${r.days_to_exp||'вҖ”'}d</strong></span>
          <span>Lot <strong>${r.lot_size||'вҖ”'}</strong></span>
        </div>
        <div class="strat-conf">
          <div class="strat-conf-fill" style="width:${Math.min(conf,100).toFixed(0)}%;background:${confCl}"></div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('sc-search').addEventListener('input', apply);
  document.getElementById('sc-dir').addEventListener('change', apply);
  document.getElementById('sc-sort').addEventListener('change', apply);
  apply();
}

function showStratSheet(r) {
  if (typeof r === 'string') try { r = JSON.parse(r); } catch { return; }
  const conf = parseFloat(r.confidence||0);
  const confCl = conf >= 70 ? 'var(--green)' : conf >= 45 ? 'var(--accent)' : 'var(--amber)';
  const dir    = (r.direction||'neutral').toLowerCase();
  const dirCls = dir.includes('bull') ? 'up' : dir.includes('bear') ? 'down' : 'neu';
  openSheet(`
    <div class="sheet-row"><span class="lbl">Strategy</span><span class="val bold">${r.strategy||'вҖ”'}</span></div>
    <div class="sheet-row"><span class="lbl">Direction</span><span class="val ${dirCls} bold">${r.direction||'вҖ”'}</span></div>
    <div class="sheet-row"><span class="lbl">Confidence</span><span class="val bold" style="color:${confCl}">${conf.toFixed(0)}%</span></div>
    <div class="sheet-row"><span class="lbl">Entry</span><span class="val bold">вӮ№${parseFloat(r.entry||0).toFixed(2)}</span></div>
    <div class="sheet-row"><span class="lbl">Target</span><span class="val up bold">вӮ№${parseFloat(r.target||0).toFixed(2)}</span></div>
    <div class="sheet-row"><span class="lbl">Stop Loss</span><span class="val down bold">вӮ№${parseFloat(r.sl||0).toFixed(2)}</span></div>
    <div class="sheet-row"><span class="lbl">Risk : Reward</span><span class="val">${r.risk_reward||'вҖ”'}</span></div>
    <div class="sheet-row"><span class="lbl">Signal</span><span class="val">${sig_badge(r.trend)}</span></div>
    <div class="sheet-row"><span class="lbl">Pattern</span><span class="val">${r.pattern||'вҖ”'}</span></div>
    <div class="sheet-row"><span class="lbl">Basis %</span><span class="val">${parseFloat(r.basis_pct||0).toFixed(2)}%</span></div>
    <div class="sheet-row"><span class="lbl">Conv Score</span><span class="val">${parseFloat(r.conv_score||0).toFixed(1)}</span></div>
    <div class="sheet-row"><span class="lbl">Lot Size</span><span class="val">${r.lot_size||'вҖ”'}</span></div>
    <div class="sheet-row"><span class="lbl">Days to Exp</span><span class="val">${r.days_to_exp||'вҖ”'}</span></div>
    <div class="sheet-row"><span class="lbl">Expiry</span><span class="val">${r.expiry||'вҖ”'}</span></div>
  `, r.symbol + ' вҖ” Strategy');
}
window.showStratSheet  = showStratSheet;
window.renderScanner   = renderScanner;

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   screener.js вҖ” Options Screener tab (Session 3)
   Reads: data.options_screener[] вҖ” each entry has:
     symbol, option_type (CE/PE), strike, expiry, ltp, iv, delta,
     theta, vega, oi, oi_chg, oi_chg_pct, volume, signal, pattern,
     days_to_exp, lot_size, spot, premium_pct
   Falls back gracefully: shows summary cards + empty state with hint.
   в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
let _scrFilter  = '';
let _scrType    = '';
let _scrSignal  = '';
let _scrSort    = 'oi_desc';

function renderScreener(data) {
  const pg = document.getElementById('page-screener');
  if (!data || !pg) return;

  const rows  = data.options_screener || [];
  const os    = data.options_summary  || {};

  /* в”Җв”Җ Options Summary strip (always shown) в”Җв”Җ */
  const pcr   = parseFloat(os.pcr  || 0);
  const ivVal = parseFloat(os.avg_iv|| os.iv || 0);
  const pcrCls = pcr > 1.2 ? 'down' : pcr < 0.8 ? 'up' : 'neu';
  const sentiment = pcr > 1.2 ? 'Bearish' : pcr < 0.8 ? 'Bullish' : 'Neutral';

  const summaryHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px">
      <div class="card" style="text-align:center;padding:8px">
        <div style="font-size:22px;font-weight:700" class="${pcrCls}">${pcr > 0 ? pcr.toFixed(2) : 'вҖ”'}</div>
        <div style="font-size:10px;color:var(--fg2)">PCR (OI)</div>
        <div style="font-size:10px;font-weight:600" class="${pcrCls}">${pcr > 0 ? sentiment : ''}</div>
      </div>
      <div class="card" style="text-align:center;padding:8px">
        <div style="font-size:22px;font-weight:700;color:var(--amber)">${ivVal > 0 ? ivVal.toFixed(1)+'%' : 'вҖ”'}</div>
        <div style="font-size:10px;color:var(--fg2)">Avg IV</div>
      </div>
      <div class="card" style="text-align:center;padding:8px">
        <div style="font-size:22px;font-weight:700;color:var(--fg)">${rows.length}</div>
        <div style="font-size:10px;color:var(--fg2)">Opportunities</div>
      </div>
    </div>`;

  if (!rows.length) {
    pg.innerHTML = summaryHTML + `
      <div class="error-state">
        <div class="err-icon">рҹ”Һ</div>
        <div>No options screener data</div>
        <div style="font-size:11px;color:var(--fg2);margin-top:6px;max-width:260px;text-align:center">
          Click <strong>Load Options</strong> in the desktop app and rebuild the snapshot,
          or check that op*.csv files are present.
        </div>
      </div>`;
    return;
  }

  pg.innerHTML = summaryHTML + `
    <!-- Filters -->
    <div class="filter-bar">
      <input id="scr-search" type="search" placeholder="SymbolвҖҰ" value="${_scrFilter}">
      <select id="scr-type">
        <option value="">CE + PE</option>
        <option value="CE"${_scrType==='CE'?' selected':''}>CE only</option>
        <option value="PE"${_scrType==='PE'?' selected':''}>PE only</option>
      </select>
      <select id="scr-signal">
        <option value="">All Signals</option>
        <option value="LB"${_scrSignal==='LB'?' selected':''}>Long Buildup</option>
        <option value="SB"${_scrSignal==='SB'?' selected':''}>Short Buildup</option>
        <option value="LU"${_scrSignal==='LU'?' selected':''}>Long Unwind</option>
        <option value="SC"${_scrSignal==='SC'?' selected':''}>Short Cover</option>
      </select>
      <select id="scr-sort">
        <option value="oi_desc"${_scrSort==='oi_desc'?' selected':''}>OI вҶ“</option>
        <option value="oichg_desc"${_scrSort==='oichg_desc'?' selected':''}>OI Chg% вҶ“</option>
        <option value="iv_desc"${_scrSort==='iv_desc'?' selected':''}>IV вҶ“</option>
        <option value="vol_desc"${_scrSort==='vol_desc'?' selected':''}>Volume вҶ“</option>
        <option value="theta_asc"${_scrSort==='theta_asc'?' selected':''}>Theta (decay)</option>
      </select>
    </div>
    <div id="scr-count" style="font-size:11px;color:var(--fg2);margin-bottom:6px"></div>
    <div class="tbl-wrap">
      <table id="tbl-screener">
        <thead><tr>
          <th>Symbol</th><th>Type</th><th>Strike</th>
          <th>LTP</th><th>IV%</th><th>OI</th><th>OI Chg%</th><th>Sig</th>
        </tr></thead>
        <tbody id="scr-tbody"></tbody>
      </table>
    </div>`;

  function apply() {
    _scrFilter = document.getElementById('scr-search').value.trim().toUpperCase();
    _scrType   = document.getElementById('scr-type').value;
    _scrSignal = document.getElementById('scr-signal').value;
    _scrSort   = document.getElementById('scr-sort').value;

    let list = rows.filter(r => {
      if (_scrFilter && !(r.symbol||'').includes(_scrFilter)) return false;
      if (_scrType   && r.option_type !== _scrType) return false;
      if (_scrSignal && r.signal !== _scrSignal)    return false;
      return true;
    });
    list.sort((a,b) => {
      if (_scrSort === 'oichg_desc') return (b.oi_chg_pct||0)   - (a.oi_chg_pct||0);
      if (_scrSort === 'iv_desc')    return (b.iv||0)             - (a.iv||0);
      if (_scrSort === 'vol_desc')   return (b.volume||0)         - (a.volume||0);
      if (_scrSort === 'theta_asc')  return (a.theta||0)          - (b.theta||0);
      return (b.oi||0) - (a.oi||0);
    });
    document.getElementById('scr-count').textContent = `${list.length} contracts`;
    document.getElementById('scr-tbody').innerHTML = list.map(r => {
      const ot   = r.option_type || 'вҖ”';
      const otCl = ot === 'CE' ? 'up' : ot === 'PE' ? 'down' : '';
      const ocp  = parseFloat(r.oi_chg_pct || 0);
      const ltp  = parseFloat(r.ltp || 0);
      const iv   = parseFloat(r.iv  || 0);
      return `<tr onclick='showScrSheet(${JSON.stringify(r)})'>
        <td><strong>${r.symbol}</strong>
          ${r.pattern ? `<span class="scr-tag scr-hit">${r.pattern}</span>` : ''}
        </td>
        <td class="${otCl} bold">${ot}</td>
        <td>вӮ№${parseFloat(r.strike||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</td>
        <td>вӮ№${ltp.toFixed(2)}</td>
        <td class="${iv>30?'down':iv>20?'neu':'up'}">${iv > 0 ? iv.toFixed(1)+'%' : 'вҖ”'}</td>
        <td>${fmt_oi(r.oi)}</td>
        <td class="${ocp>=0?'up':'down'}">${ocp>=0?'+':''}${ocp.toFixed(2)}%</td>
        <td>${sig_badge(r.signal)}</td>
      </tr>`;
    }).join('');
    makeSortable('tbl-screener');
  }

  document.getElementById('scr-search').addEventListener('input',  apply);
  document.getElementById('scr-type').addEventListener('change',   apply);
  document.getElementById('scr-signal').addEventListener('change', apply);
  document.getElementById('scr-sort').addEventListener('change',   apply);
  apply();
}

function showScrSheet(r) {
  if (typeof r === 'string') try { r = JSON.parse(r); } catch { return; }
  const ot   = r.option_type || 'вҖ”';
  const otCl = ot === 'CE' ? 'up' : ot === 'PE' ? 'down' : '';
  const ocp  = parseFloat(r.oi_chg_pct || 0);
  openSheet(`
    <div class="sheet-row"><span class="lbl">Option Type</span><span class="val ${otCl} bold">${ot}</span></div>
    <div class="sheet-row"><span class="lbl">Strike</span><span class="val bold">вӮ№${parseFloat(r.strike||0).toLocaleString('en-IN',{maximumFractionDigits:0})}</span></div>
    <div class="sheet-row"><span class="lbl">Expiry</span><span class="val">${r.expiry||'вҖ”'} (${r.days_to_exp||'вҖ”'}d)</span></div>
    <div class="sheet-row"><span class="lbl">LTP</span><span class="val bold">вӮ№${parseFloat(r.ltp||0).toFixed(2)}</span></div>
    <div class="sheet-row"><span class="lbl">Spot</span><span class="val">вӮ№${parseFloat(r.spot||0).toLocaleString('en-IN',{maximumFractionDigits:2})}</span></div>
    <div class="sheet-row"><span class="lbl">IV</span><span class="val">${parseFloat(r.iv||0).toFixed(1)}%</span></div>
    <div class="sheet-row"><span class="lbl">Delta</span><span class="val">${parseFloat(r.delta||0).toFixed(3)}</span></div>
    <div class="sheet-row"><span class="lbl">Theta</span><span class="val down">${parseFloat(r.theta||0).toFixed(3)}</span></div>
    <div class="sheet-row"><span class="lbl">Vega</span><span class="val">${parseFloat(r.vega||0).toFixed(3)}</span></div>
    <div class="sheet-row"><span class="lbl">Open Interest</span><span class="val">${fmt_oi(r.oi)} lots</span></div>
    <div class="sheet-row"><span class="lbl">OI Change</span><span class="val ${ocp>=0?'up':'down'}">${ocp>=0?'+':''}${ocp.toFixed(2)}%</span></div>
    <div class="sheet-row"><span class="lbl">Volume</span><span class="val">${fmt_oi(r.volume)}</span></div>
    <div class="sheet-row"><span class="lbl">Signal</span><span class="val">${sig_badge(r.signal)}</span></div>
    <div class="sheet-row"><span class="lbl">Pattern</span><span class="val">${r.pattern||'вҖ”'}</span></div>
    <div class="sheet-row"><span class="lbl">Premium %</span><span class="val">${parseFloat(r.premium_pct||0).toFixed(2)}%</span></div>
    <div class="sheet-row"><span class="lbl">Lot Size</span><span class="val">${r.lot_size||'вҖ”'}</span></div>
  `, r.symbol + ' ' + ot + ' ' + parseFloat(r.strike||0).toLocaleString('en-IN',{maximumFractionDigits:0}));
}
window.showScrSheet   = showScrSheet;
window.renderScreener = renderScreener;

  </script>
</body>
</html>
