<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="F&O Tracker">
  <meta name="description" content="NSE Futures & Options EOD Data Tracker by SDK Fintech">
  <title>NSE F&amp;O Tracker</title>
  <link rel="manifest" href="manifest.json">
  <style>
/* ── CSS Variables ───────────────────────────────────────────────────── */
:root {
  --bg:      #0d1b2a;
  --panel:   #1a2e42;
  --panel2:  #1f3850;
  --fg:      #d0e8f8;
  --fg2:     #7ca8c8;
  --accent:  #1a7abf;
  --green:   #22c55e;
  --red:     #ef4444;
  --amber:   #f59e0b;
  --purple:  #a855f7;
  --blue:    #3b82f6;
  --border:  #2a3f54;
  --shadow:  rgba(0,0,0,0.4);
  --tab-h:   56px;
  --head-h:  48px;
  --radius:  8px;
}
body.light {
  --bg:      #f0f4f8;
  --panel:   #ffffff;
  --panel2:  #e8f0f8;
  --fg:      #1a2e42;
  --fg2:     #4a6a8a;
  --border:  #c8d8e8;
  --shadow:  rgba(0,0,0,0.1);
}

/* ── Reset ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  font-size: 13px;
  -webkit-tap-highlight-color: transparent;
}

/* ── Header ──────────────────────────────────────────────────────────── */
#header {
  height: var(--head-h);
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 8px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  box-shadow: 0 2px 8px var(--shadow);
}
#header h1 { font-size: 15px; font-weight: 700; color: var(--fg); flex: 1; }
#header h1 span { color: var(--accent); }
#data-ts { font-size: 11px; color: var(--fg2); white-space: nowrap; }
#theme-btn {
  background: none; border: none; cursor: pointer;
  color: var(--fg2); font-size: 16px; padding: 4px;
}
#refresh-btn {
  background: var(--accent); border: none; cursor: pointer;
  color: #fff; font-size: 11px; padding: 4px 10px;
  border-radius: 4px; font-weight: 600;
}

/* ── Offline banner ──────────────────────────────────────────────────── */
#offline-banner {
  display: none;
  background: var(--amber);
  color: #000;
  text-align: center;
  font-size: 11px;
  padding: 4px;
  position: fixed;
  top: var(--head-h);
  left: 0; right: 0;
  z-index: 99;
}
#offline-banner.show { display: block; }

/* ── Main content area ───────────────────────────────────────────────── */
#content {
  position: fixed;
  top: var(--head-h);
  bottom: var(--tab-h);
  left: 0; right: 0;
  overflow: hidden;
}
#content.has-banner { top: calc(var(--head-h) + 24px); }

/* ── Tab pages ───────────────────────────────────────────────────────── */
.page {
  display: none;
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px;
  -webkit-overflow-scrolling: touch;
}
.page.active { display: block; }

/* ── Bottom tab bar ──────────────────────────────────────────────────── */
#tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  background: var(--panel);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--fg2);
  font-size: 10px;
  padding: 4px 2px;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn .icon { font-size: 18px; line-height: 1; }
.tab-btn.active { color: var(--accent); }
.tab-btn.active .icon { transform: scale(1.1); }

/* ── Cards & Tables ──────────────────────────────────────────────────── */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 8px;
}
.card-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--fg2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

/* Summary cards row */
.summary-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
.summary-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  text-align: center;
}
.summary-card .val {
  font-size: 18px;
  font-weight: 700;
  color: var(--fg);
}
.summary-card .lbl { font-size: 10px; color: var(--fg2); margin-top: 2px; }
.summary-card .chg { font-size: 12px; font-weight: 600; margin-top: 2px; }

/* Table */
.tbl-wrap { overflow-x: auto; border-radius: var(--radius); }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  background: var(--panel2);
  color: var(--fg2);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  padding: 6px 8px;
  text-align: left;
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
}
th:hover { color: var(--fg); }
td {
  padding: 7px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  color: var(--fg);
}
tr:last-child td { border-bottom: none; }
tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
tr.lb td { color: #22c55e; font-weight: 600; }
tr.sb td { color: #ef4444; font-weight: 600; }
tr.lu td { color: #f59e0b; }
tr.sc td { color: #a855f7; }

/* Signal badge */
.sig {
  display: inline-block;
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
}
.sig-lb { background: #064e1a; color: #22c55e; }
.sig-sb { background: #4e0606; color: #ef4444; }
.sig-lu { background: #4e3006; color: #f59e0b; }
.sig-sc { background: #2e0650; color: #a855f7; }

/* ── Colour helpers ──────────────────────────────────────────────────── */
.up   { color: var(--green); }
.down { color: var(--red); }
.neu  { color: var(--fg2); }
.bold { font-weight: 700; }

/* ── Section header ──────────────────────────────────────────────────── */
.sec-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 10px 0 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--fg);
}
.sec-head::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Filter bar ──────────────────────────────────────────────────────── */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 8px;
  align-items: center;
}
.filter-bar input, .filter-bar select {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--fg);
  border-radius: 4px;
  padding: 5px 8px;
  font-size: 12px;
  outline: none;
}
.filter-bar input { flex: 1; min-width: 120px; }
.filter-bar select { min-width: 110px; }

/* ── OI Heatmap tiles ────────────────────────────────────────────────── */
#heatmap-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 4px;
  margin-top: 8px;
}
.hm-tile {
  border-radius: 6px;
  padding: 8px 6px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.1s;
  min-height: 70px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.hm-tile:active { transform: scale(0.96); }
.hm-tile .hm-sym { font-size: 11px; font-weight: 700; }
.hm-tile .hm-ltp { font-size: 13px; font-weight: 700; }
.hm-tile .hm-pct { font-size: 10px; }
.hm-tile .hm-oi  { font-size: 9px; opacity: 0.85; }
.hm-tile .hm-sig { font-size: 9px; font-weight: 700; margin-top: 2px; }

/* ── Rollover progress bar ───────────────────────────────────────────── */
.roll-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 3px;
  overflow: hidden;
}
.roll-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent);
  transition: width 0.3s;
}

/* ── Bottom sheet ────────────────────────────────────────────────────── */
#sheet-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
}
#sheet-overlay.show { display: block; }
#bottom-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--panel);
  border-radius: 16px 16px 0 0;
  padding: 16px;
  max-height: 70vh;
  overflow-y: auto;
  z-index: 201;
  transform: translateY(100%);
  transition: transform 0.25s ease;
}
#bottom-sheet.open { transform: translateY(0); }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 12px;
}
.sheet-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.sheet-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.sheet-row:last-child { border-bottom: none; }
.sheet-row .lbl { color: var(--fg2); }
.sheet-row .val { font-weight: 600; }

/* ── Skeleton loader ─────────────────────────────────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--panel) 25%, var(--panel2) 50%, var(--panel) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
  height: 14px;
  margin-bottom: 6px;
}
@keyframes shimmer { to { background-position: -200% 0; } }

/* ── Toast ───────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: calc(var(--tab-h) + 12px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--panel2);
  color: var(--fg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 300;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Error state ─────────────────────────────────────────────────────── */
.error-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  gap: 12px;
  color: var(--fg2);
  text-align: center;
}
.error-state .err-icon { font-size: 36px; }
.retry-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

/* ── Pull to refresh spinner ─────────────────────────────────────────── */
#ptr-spinner {
  display: none;
  text-align: center;
  padding: 8px;
  color: var(--accent);
  font-size: 18px;
  animation: spin 0.8s linear infinite;
}
#ptr-spinner.show { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Mini sparkline ──────────────────────────────────────────────────── */
.spark { display: inline-block; vertical-align: middle; }

/* ── Ban badge ───────────────────────────────────────────────────────── */
.ban-badge {
  display: inline-block;
  background: #7f1d1d;
  color: #fca5a5;
  font-size: 9px;
  font-weight: 700;
  padding: 1px 4px;
  border-radius: 3px;
  margin-right: 3px;
}

/* ── Scrollbar ───────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (min-width: 600px) {
  .summary-row { grid-template-columns: repeat(4, 1fr); }
  #heatmap-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  #tabbar { max-width: 600px; margin: 0 auto; }
}

  </style>
</head>
<body>

  <div id="header">
    <h1>NSE <span>F&amp;O</span> Tracker</h1>
    <span id="data-ts">—</span>
    <button id="theme-btn" onclick="toggleTheme()">☀️</button>
    <button id="refresh-btn" onclick="loadData(true)">↻</button>
  </div>
  <div id="offline-banner"></div>

  <div id="content">
    <div id="page-pulse"    class="page active">
      <div class="skeleton" style="height:80px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:40px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:200px"></div>
    </div>
    <div id="page-futures"  class="page">
      <div class="skeleton" style="height:40px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:300px"></div>
    </div>
    <div id="page-oi"       class="page">
      <div class="skeleton" style="height:40px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:300px"></div>
    </div>
    <div id="page-rollover" class="page">
      <div class="skeleton" style="height:120px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:300px"></div>
    </div>
    <div id="page-basis"    class="page">
      <div class="skeleton" style="height:60px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:300px"></div>
    </div>
  </div>

  <div id="sheet-overlay"></div>
  <div id="bottom-sheet"></div>
  <div id="toast"></div>

  <nav id="tabbar">
    <button id="tab-pulse"    class="tab-btn active" onclick="switchTab('pulse')">
      <span class="icon">📊</span><span>Pulse</span>
    </button>
    <button id="tab-futures"  class="tab-btn" onclick="switchTab('futures')">
      <span class="icon">📈</span><span>Futures</span>
    </button>
    <button id="tab-oi"       class="tab-btn" onclick="switchTab('oi')">
      <span class="icon">🔥</span><span>OI</span>
    </button>
    <button id="tab-rollover" class="tab-btn" onclick="switchTab('rollover')">
      <span class="icon">🔄</span><span>Rollover</span>
    </button>
    <button id="tab-basis"    class="tab-btn" onclick="switchTab('basis')">
      <span class="icon">⚖️</span><span>Basis</span>
    </button>
  </nav>

  <script>
/* ══════════════════════════════════════════════════════════════════════
   app.js — NSE F&O Tracker PWA — SDK Fintech
   Main: data load, router, tab nav, utilities
   ══════════════════════════════════════════════════════════════════════ */

// ── Config — CHANGE THIS URL to your GitHub raw JSON URL ─────────────
const DATA_URL = './fo_snapshot_v3.json';
const REFRESH_MS = 5 * 60 * 1000;  // 5 min

// ── Global state ──────────────────────────────────────────────────────
window.FO = {
  data:      null,
  loading:   false,
  lastFetch: null,
  offline:   false,
  tab:       'pulse',
};

// ── DOM refs ──────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

// ── Register service worker ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'BG_REFRESH') loadData();
  });
}

// ── Data loader ───────────────────────────────────────────────────────
async function loadData(force = false) {
  if (FO.loading) return;
  FO.loading = true;
  showPTR(true);

  try {
    const url = force ? DATA_URL + '?t=' + Date.now() : DATA_URL;
    const resp = await fetch(url, { cache: force ? 'no-cache' : 'default' });

    if (resp.ok) {
      FO.data     = await resp.json();
      FO.lastFetch = new Date();
      FO.offline  = false;
      setOfflineBanner(false);
      updateTimestamp();
      renderCurrentTab();
      showToast('Data updated · ' + fmt_time(FO.lastFetch));
    } else {
      throw new Error('HTTP ' + resp.status);
    }
  } catch (err) {
    // Try cache
    try {
      const cached = await caches.match(DATA_URL);
      if (cached) {
        FO.data    = await cached.json();
        FO.offline = true;
        setOfflineBanner(true, FO.data?.meta?.date_fmt);
        updateTimestamp();
        renderCurrentTab();
      } else {
        showError();
      }
    } catch {
      showError();
    }
  } finally {
    FO.loading = false;
    showPTR(false);
  }
}

// ── Tab router ────────────────────────────────────────────────────────
const TAB_RENDERERS = {
  pulse:    () => window.renderPulse    && renderPulse(FO.data),
  futures:  () => window.renderFutures  && renderFutures(FO.data),
  oi:       () => window.renderOI       && renderOI(FO.data),
  rollover: () => window.renderRollover && renderRollover(FO.data),
  basis:    () => window.renderBasis    && renderBasis(FO.data),
};

function switchTab(name) {
  FO.tab = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const pg = $('page-' + name);
  if (pg) pg.classList.add('active');
  const btn = $('tab-' + name);
  if (btn) btn.classList.add('active');
  renderCurrentTab();
}

function renderCurrentTab() {
  if (!FO.data) return;
  const fn = TAB_RENDERERS[FO.tab];
  if (fn) try { fn(); } catch(e) { console.error('Render error:', e); }
}

// ── Swipe navigation ──────────────────────────────────────────────────
const TABS = ['pulse','futures','oi','rollover','basis'];
let touchX0 = 0;
document.addEventListener('touchstart', e => { touchX0 = e.touches[0].clientX; }, {passive: true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX0;
  if (Math.abs(dx) < 60) return;
  const idx = TABS.indexOf(FO.tab);
  if (dx < 0 && idx < TABS.length - 1) switchTab(TABS[idx + 1]);
  if (dx > 0 && idx > 0)               switchTab(TABS[idx - 1]);
}, {passive: true});

// ── Pull-to-refresh ───────────────────────────────────────────────────
let ptY0 = 0, pulling = false;
document.addEventListener('touchstart', e => {
  const pg = document.querySelector('.page.active');
  if (pg && pg.scrollTop === 0) { ptY0 = e.touches[0].clientY; pulling = true; }
}, {passive: true});
document.addEventListener('touchend', e => {
  if (pulling && e.changedTouches[0].clientY - ptY0 > 60) loadData(true);
  pulling = false;
}, {passive: true});

// ── Bottom sheet ──────────────────────────────────────────────────────
function openSheet(html, title) {
  const overlay = $('sheet-overlay');
  const sheet   = $('bottom-sheet');
  sheet.innerHTML = `
    <div class="sheet-handle"></div>
    <div class="sheet-title">${title}</div>
    ${html}
  `;
  overlay.classList.add('show');
  requestAnimationFrame(() => sheet.classList.add('open'));
}
function closeSheet() {
  $('sheet-overlay').classList.remove('show');
  $('bottom-sheet').classList.remove('open');
}
document.getElementById('sheet-overlay').addEventListener('click', closeSheet);

// ── Helpers ───────────────────────────────────────────────────────────
function fmt_inr(v) {
  if (v == null || isNaN(v)) return '—';
  const n = parseFloat(v);
  if (Math.abs(n) >= 1e7)  return '₹' + (n/1e7).toFixed(2) + 'Cr';
  if (Math.abs(n) >= 1e5)  return '₹' + (n/1e5).toFixed(2) + 'L';
  return '₹' + n.toLocaleString('en-IN', {maximumFractionDigits: 2});
}
function fmt_num(v, dec=2) {
  if (v == null || isNaN(v)) return '—';
  return parseFloat(v).toFixed(dec);
}
function fmt_pct(v, dec=2) {
  if (v == null || isNaN(v)) return '—';
  const n = parseFloat(v);
  const cls = n > 0 ? 'up' : n < 0 ? 'down' : 'neu';
  const sign = n > 0 ? '+' : '';
  return `<span class="${cls}">${sign}${n.toFixed(dec)}%</span>`;
}
function fmt_oi(v) {
  if (v == null) return '—';
  const n = parseInt(v);
  if (n >= 1e7) return (n/1e7).toFixed(2) + 'Cr';
  if (n >= 1e5) return (n/1e5).toFixed(2) + 'L';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}
function fmt_time(d) {
  return d.toTimeString().slice(0,5);
}
function sig_badge(s) {
  if (!s) return '';
  const map = {LB:'lb',SB:'sb',LU:'lu',SC:'sc'};
  return `<span class="sig sig-${map[s]||''}">${s}</span>`;
}
function price_cls(v) { return parseFloat(v) > 0 ? 'up' : parseFloat(v) < 0 ? 'down' : 'neu'; }
function row_cls(sig) { return sig ? sig.toLowerCase() : ''; }
function ban_badge(r) {
  return r?.ban_status === 'ban' ? '<span class="ban-badge">BAN</span>' : '';
}
window.fmt_inr   = fmt_inr;
window.fmt_num   = fmt_num;
window.fmt_pct   = fmt_pct;
window.fmt_oi    = fmt_oi;
window.sig_badge = sig_badge;
window.price_cls = price_cls;
window.row_cls   = row_cls;
window.ban_badge = ban_badge;
window.openSheet = openSheet;

// ── Sort table helper ─────────────────────────────────────────────────
function makeSortable(tableId) {
  const tbl = document.getElementById(tableId);
  if (!tbl) return;
  let sortCol = -1, sortAsc = true;
  tbl.querySelectorAll('th').forEach((th, i) => {
    th.addEventListener('click', () => {
      const tbody = tbl.querySelector('tbody');
      const rows  = Array.from(tbody.querySelectorAll('tr'));
      if (sortCol === i) sortAsc = !sortAsc; else { sortCol = i; sortAsc = true; }
      rows.sort((a, b) => {
        const av = a.cells[i]?.innerText.replace(/[₹%+,]/g,'').trim() || '';
        const bv = b.cells[i]?.innerText.replace(/[₹%+,]/g,'').trim() || '';
        const an = parseFloat(av), bn = parseFloat(bv);
        if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an-bn : bn-an;
        return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
      });
      rows.forEach(r => tbody.appendChild(r));
      tbl.querySelectorAll('th').forEach((h,j) => {
        h.textContent = h.textContent.replace(' ↑','').replace(' ↓','');
        if (j === i) h.textContent += sortAsc ? ' ↑' : ' ↓';
      });
    });
  });
}
window.makeSortable = makeSortable;

function renderHeatmap(rows, mode='rank50') {
  const grid=document.getElementById('heatmap-grid'); if(!grid) return;
  function sc(r){return (parseFloat(r.chg_pct||0)*0.5)+(parseFloat(r.oi_chg_pct||0)*0.5);}
  const scored=[...rows].map(r=>({...r,_sc:sc(r)})).sort((a,b)=>b._sc-a._sc);
  let heat;
  if(mode==='all') heat=scored;
  else if(mode==='g25l25'){
    const byP=[...rows].sort((a,b)=>(b.chg_pct||0)-(a.chg_pct||0));
    heat=[...byP.slice(0,25),...byP.slice(-25).reverse()];
  } else heat=scored.slice(0,50);

  function ts(s,p){
    const a=Math.abs(s);
    if(a<1) return {bg:'#1a1f2e',fg:p>=0?'#22c55e':'#ef4444',brd:'#2a3040'};
    if(s>=5) return {bg:'#004d00',fg:'#fff',brd:'#006600'};
    if(s>=3) return {bg:'#006600',fg:'#fff',brd:'#008800'};
    if(s>=1) return {bg:'#1a8c1a',fg:'#fff',brd:'#22aa22'};
    if(s>=-3) return {bg:'#991a1a',fg:'#fff',brd:'#bb2222'};
    if(s>=-5) return {bg:'#cc0000',fg:'#fff',brd:'#dd1111'};
    return {bg:'#800000',fg:'#fff',brd:'#990000'};
  }
  const SC2={LB:'#00e676',SB:'#ff5252',LU:'#ffab40',SC:'#ce93d8'};
  grid.innerHTML=heat.map((r,i)=>{
    const s=r._sc||sc(r),p=parseFloat(r.chg_pct||0),o=parseFloat(r.oi_chg_pct||0);
    const l=parseFloat(r.ltp||0),{bg,fg,brd}=ts(s,p),top=i<10;
    const sig=r.trend||r.signal||'';
    const rb=top?`<div style="position:absolute;top:3px;left:3px;background:#1a7abf;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px">#${i+1}</div>`:'';
    const sc2=SC2[sig]||'';
    const sb2=sig&&sc2?`<div style="position:absolute;bottom:3px;left:3px;background:${sc2};color:#000;font-size:${top?9:7}px;font-weight:700;padding:1px ${top?6:4}px;border-radius:3px">${sig}</div>`:'';
    return `<div class="hm-tile" style="background:${bg};border:1px solid ${brd};min-height:${top?110:52}px;position:relative;color:${fg}" onclick='showSymbolSheet(${JSON.stringify({...r,signal:sig,lot:r.lot_size})})'>
      ${rb}
      <div style="font-size:11px;font-weight:700;color:${fg}">${r.symbol}</div>
      <div style="font-size:${top?14:10}px;font-weight:700;color:${fg}">₹${l>=10000?l.toFixed(0):l.toFixed(1)}</div>
      <div style="font-size:${top?10:8}px;color:${fg}">${p>=0?'+':''}${p.toFixed(2)}%</div>
      <div style="font-size:8px;color:${o>=0?'#00e676':'#ff5252'}">OI ${o>=0?'+':''}${o.toFixed(1)}%</div>
      ${sb2}</div>`;
  }).join('');
}

      <div class="tbl-wrap"><table>
        <thead><tr><th>Symbol</th><th>LTP</th><th>Chg%</th><th>OI</th><th>OI Chg%</th><th>Sig</th></tr></thead>
        <tbody>${losers.map(r=>oiRow(r)).join('')}</tbody>
      </table></div>
    </div>
    <div id="oi-screen-signals" style="display:none">
      ${['LB','SB','LU','SC'].map(code=>{
        const items=sb[code].slice(0,10);
        const cols={LB:'#22c55e',SB:'#ef4444',LU:'#f59e0b',SC:'#a855f7'};
        const names={LB:'Long Buildup',SB:'Short Buildup',LU:'Long Unwinding',SC:'Short Covering'};
        const descs={LB:'Price↑ OI↑',SB:'Price↓ OI↑',LU:'Price↓ OI↓',SC:'Price↑ OI↓'};
        return `<div class="card" style="border-color:${cols[code]}22;margin-bottom:10px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <span class="sig sig-${code.toLowerCase()}" style="font-size:13px;padding:3px 8px">${code}</span>
            <span style="font-size:13px;font-weight:700;color:${cols[code]}">${names[code]}</span>
            <span style="margin-left:auto;font-size:22px;font-weight:700;color:${cols[code]}">${items.length}</span>
          </div>
          <div style="font-size:10px;color:var(--fg2);margin-bottom:8px">${descs[code]}</div>
          ${items.length?`<div class="tbl-wrap"><table>
            <thead><tr><th>Symbol</th><th>LTP</th><th>Chg%</th><th>OI Chg%</th></tr></thead>
            <tbody>${items.map(r=>`<tr class="${row_cls(r.trend)}" onclick='showFutSheet(${JSON.stringify(r)})'>
              <td><strong>${r.symbol}</strong></td>
              <td>₹${(r.ltp||0).toFixed(2)}</td>
              <td class="${(r.chg_pct||0)>=0?'up':'down'}">${(r.chg_pct||0)>=0?'+':''}${(r.chg_pct||0).toFixed(2)}%</td>
              <td class="${(r.oi_chg_pct||0)>=0?'up':'down'}">${(r.oi_chg_pct||0)>=0?'+':''}${(r.oi_chg_pct||0).toFixed(2)}%</td>
            </tr>`).join('')}</tbody>
          </table></div>`:'<div style="color:var(--fg2);font-size:12px;padding:6px">No signals</div>'}
        </div>`;
      }).join('')}
    </div>`;
  oiSwitch(_oiScreen);
}
function oiRow(r){
  const p=parseFloat(r.chg_pct||0),o=parseFloat(r.oi_chg_pct||0),l=parseFloat(r.ltp||0);
  return `<tr class="${row_cls(r.trend)}" onclick='showFutSheet(${JSON.stringify(r)})'>
    <td>${ban_badge(r)}<strong>${r.symbol}</strong></td>
    <td>₹${l>=10000?l.toFixed(0):l.toFixed(2)}</td>
    <td class="${p>=0?'up':'down'}">${p>=0?'+':''}${p.toFixed(2)}%</td>
    <td>${fmt_oi(r.oi)}</td>
    <td class="${o>=0?'up':'down'} bold">${o>=0?'+':''}${o.toFixed(2)}%</td>
    <td>${sig_badge(r.trend)}</td></tr>`;
}
function oiSwitch(s){
  _oiScreen=s;
  const m=document.getElementById('oi-screen-movers');
  const sg=document.getElementById('oi-screen-signals');
  const bm=document.getElementById('oi-btn-movers');
  const bs=document.getElementById('oi-btn-signals');
  if(!m||!sg) return;
  if(s==='movers'){
    m.style.display='block';sg.style.display='none';
    if(bm){bm.style.background='var(--accent)';bm.style.color='#fff';}
    if(bs){bs.style.background='var(--panel)';bs.style.color='var(--fg2)';}
  }else{
    m.style.display='none';sg.style.display='block';
    if(bs){bs.style.background='var(--accent)';bs.style.color='#fff';}
    if(bm){bm.style.background='var(--panel)';bm.style.color='var(--fg2)';}
  }
}
window.oiSwitch=oiSwitch;
window.renderOI=renderOI;

/* rollover.js — fixed for v3 snapshot */
function renderRollover(data){
  const pg=document.getElementById('page-rollover');
  if(!data||!pg) return;
  const rv=data.rollover||{};
  const rows=rv.symbols||[];
  const mktPct=rv.market_rollover_pct||0;

  if(!rows.length){
    pg.innerHTML='<div class="error-state"><div class="err-icon">📭</div><div>No rollover data</div></div>';
    return;
  }
  pg.innerHTML=`
    <div class="card" style="text-align:center;margin-bottom:12px">
      <div class="card-title">Market Rollover %</div>
      <div style="font-size:48px;font-weight:700;color:var(--accent);line-height:1">${Number(mktPct).toFixed(1)}%</div>
      <div style="font-size:11px;color:var(--fg2);margin-top:6px">${rows.length} symbols tracked</div>
      <div style="margin:12px auto;width:160px;height:80px;position:relative;overflow:hidden">
        <div style="position:absolute;bottom:0;left:0;width:160px;height:160px;
          border-radius:50%;border:12px solid var(--border);clip-path:inset(0 0 50% 0)"></div>
        <div style="position:absolute;bottom:0;left:0;width:160px;height:160px;
          border-radius:50%;border:12px solid var(--accent);clip-path:inset(0 0 50% 0);
          transform:rotate(${Math.min(mktPct,100)*1.8-180}deg);transform-origin:50% 100%;
          transition:transform 0.5s ease"></div>
      </div>
    </div>
    <div class="filter-bar">
      <input id="ro-search" type="search" placeholder="Search symbol…">
      <select id="ro-sort">
        <option value="roll_desc">Roll% ↓</option>
        <option value="roll_asc">Roll% ↑</option>
        <option value="oi_desc">OI ↓</option>
      </select>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Symbol</th><th>Roll%</th><th>Near OI</th><th>Next OI</th><th>CoC%</th><th>Bias</th></tr></thead>
      <tbody id="ro-tbody"></tbody>
    </table></div>`;

  function apply(){
    const q=document.getElementById('ro-search').value.trim().toUpperCase();
    const so=document.getElementById('ro-sort').value;
    let list=rows.filter(r=>!q||(r.symbol||'').includes(q));
    list.sort((a,b)=>{
      if(so==='roll_asc') return (a.rollover_pct||0)-(b.rollover_pct||0);
      if(so==='oi_desc')  return (b.oi_near||0)-(a.oi_near||0);
      return (b.rollover_pct||0)-(a.rollover_pct||0);
    });
    document.getElementById('ro-tbody').innerHTML=list.map(r=>{
      const rp=parseFloat(r.rollover_pct||0);
      const coc=parseFloat(r.cost_of_carry||0);
      const fc=rp>=70?'#22c55e':rp>=40?'#1a7abf':'#f59e0b';
      return `<tr onclick='showRollSheet(${JSON.stringify(r)})'>
        <td><strong>${r.symbol}</strong></td>
        <td><div style="font-weight:700">${rp.toFixed(1)}%</div>
          <div class="roll-bar"><div class="roll-fill" style="width:${Math.min(rp,100).toFixed(1)}%;background:${fc}"></div></div></td>
        <td>${fmt_oi(r.oi_near)}</td>
        <td>${fmt_oi(r.oi_next)}</td>
        <td class="${coc>=0?'up':'down'}">${coc>=0?'+':''}${coc.toFixed(2)}%</td>
        <td>${r.bias||'—'}</td></tr>`;
    }).join('');
  }
  document.getElementById('ro-search').addEventListener('input',apply);
  document.getElementById('ro-sort').addEventListener('change',apply);
  apply();
}
function showRollSheet(r){
  if(typeof r==='string') try{r=JSON.parse(r);}catch{return;}
  openSheet(`
    <div class="sheet-row"><span class="lbl">Rollover %</span><span class="val bold" style="font-size:22px">${(r.rollover_pct||0).toFixed(1)}%</span></div>
    <div class="sheet-row"><span class="lbl">Near OI</span><span class="val">${fmt_oi(r.oi_near)} lots</span></div>
    <div class="sheet-row"><span class="lbl">Next OI</span><span class="val">${fmt_oi(r.oi_next)} lots</span></div>
    <div class="sheet-row"><span class="lbl">Near Expiry</span><span class="val">${r.expiry_near||'—'}</span></div>
    <div class="sheet-row"><span class="lbl">Next Expiry</span><span class="val">${r.expiry_next||'—'}</span></div>
    <div class="sheet-row"><span class="lbl">Cost of Carry</span><span class="val ${(r.cost_of_carry||0)>=0?'up':'down'}">${(r.cost_of_carry||0).toFixed(2)}%</span></div>
    <div class="sheet-row"><span class="lbl">Bias</span><span class="val">${r.bias||'—'}</span></div>
  `,r.symbol+' — Rollover');
}
window.showRollSheet=showRollSheet;
window.renderRollover=renderRollover;

/* basis.js — fixed for v3 snapshot */
function renderBasis(data){
  const pg=document.getElementById('page-basis');
  if(!data||!pg) return;
  // basis data lives in futures array
  const rows=(data.futures||[]).filter(r=>r.expiry_rank===1&&r.spot>0);
  const premium =rows.filter(r=>(r.basis_pct||0)> 0.5).length;
  const discount=rows.filter(r=>(r.basis_pct||0)<-0.5).length;
  const parity  =rows.length-premium-discount;

  pg.innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div class="card" style="flex:1;text-align:center;padding:8px;border-color:#064e1a">
        <div style="font-size:22px;font-weight:700;color:var(--green)">${premium}</div>
        <div style="font-size:10px;color:var(--fg2)">Premium</div>
      </div>
      <div class="card" style="flex:1;text-align:center;padding:8px">
        <div style="font-size:22px;font-weight:700;color:var(--fg2)">${parity}</div>
        <div style="font-size:10px;color:var(--fg2)">Parity</div>
      </div>
      <div class="card" style="flex:1;text-align:center;padding:8px;border-color:#4e0606">
        <div style="font-size:22px;font-weight:700;color:var(--red)">${discount}</div>
        <div style="font-size:10px;color:var(--fg2)">Discount</div>
      </div>
    </div>
    <div class="filter-bar">
      <input id="ba-search" type="search" placeholder="Search symbol…">
      <select id="ba-filter">
        <option value="">All</option>
        <option value="premium">Premium only</option>
        <option value="discount">Discount only</option>
      </select>
      <select id="ba-sort">
        <option value="basis_desc">Basis% ↓</option>
        <option value="basis_asc">Basis% ↑</option>
        <option value="conv_desc">Conv ↓</option>
        <option value="oi_desc">OI ↓</option>
      </select>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th>Symbol</th><th>Spot</th><th>LTP</th>
        <th>Basis%</th><th>FV</th><th>Conv</th><th>Sig</th>
      </tr></thead>
      <tbody id="ba-tbody"></tbody>
    </table></div>`;

  function apply(){
    const q=document.getElementById('ba-search').value.trim().toUpperCase();
    const f=document.getElementById('ba-filter').value;
    const so=document.getElementById('ba-sort').value;
    let list=rows.filter(r=>{
      if(q&&!r.symbol.includes(q)) return false;
      const bp=r.basis_pct||0;
      if(f==='premium'&&bp<=0.5) return false;
      if(f==='discount'&&bp>=-0.5) return false;
      return true;
    });
    list.sort((a,b)=>{
      if(so==='basis_asc') return (a.basis_pct||0)-(b.basis_pct||0);
      if(so==='conv_desc') return (b.conv_score||0)-(a.conv_score||0);
      if(so==='oi_desc')   return (b.oi||0)-(a.oi||0);
      return (b.basis_pct||0)-(a.basis_pct||0);
    });
    document.getElementById('ba-tbody').innerHTML=list.map(r=>{
      const bp=parseFloat(r.basis_pct||0);
      let bpCls='neu';
      if(bp>1) bpCls='up bold'; else if(bp<-1) bpCls='down bold';
      else if(bp>0.3) bpCls='up'; else if(bp<-0.3) bpCls='down';
      return `<tr class="${row_cls(r.trend)}" onclick='showBasisSheet(${JSON.stringify(r)})'>
        <td><strong>${r.symbol}</strong></td>
        <td>₹${(r.spot||0).toFixed(2)}</td>
        <td>₹${(r.ltp||0).toFixed(2)}</td>
        <td class="${bpCls}">${bp>=0?'+':''}${bp.toFixed(2)}%</td>
        <td>₹${(r.fair_value||0).toFixed(2)}</td>
        <td>${(r.conv_score||0).toFixed(1)}</td>
        <td>${sig_badge(r.trend)}</td></tr>`;
    }).join('');
  }
  document.getElementById('ba-search').addEventListener('input',apply);
  document.getElementById('ba-filter').addEventListener('change',apply);
  document.getElementById('ba-sort').addEventListener('change',apply);
  apply();
}
function showBasisSheet(r){
  if(typeof r==='string') try{r=JSON.parse(r);}catch{return;}
  const bp=parseFloat(r.basis_pct||0),fvd=parseFloat(r.fv_diff||0);
  openSheet(`
    <div class="sheet-row"><span class="lbl">Spot</span><span class="val bold">₹${(r.spot||0).toLocaleString('en-IN',{maximumFractionDigits:2})}</span></div>
    <div class="sheet-row"><span class="lbl">Futures LTP</span><span class="val bold">₹${(r.ltp||0).toLocaleString('en-IN',{maximumFractionDigits:2})}</span></div>
    <div class="sheet-row"><span class="lbl">Basis</span><span class="val">₹${(r.basis||0).toFixed(2)}</span></div>
    <div class="sheet-row"><span class="lbl">Basis %</span><span class="val ${bp>=0?'up':'down'} bold">${bp>=0?'+':''}${bp.toFixed(2)}%</span></div>
    <div class="sheet-row"><span class="lbl">Fair Value</span><span class="val">₹${(r.fair_value||0).toFixed(2)}</span></div>
    <div class="sheet-row"><span class="lbl">FV Diff</span><span class="val ${fvd>=0?'up':'down'}">${fvd>=0?'+':''}${fvd.toFixed(2)}</span></div>
    <div class="sheet-row"><span class="lbl">Conv Score</span><span class="val">${(r.conv_score||0).toFixed(1)}</span></div>
    <div class="sheet-row"><span class="lbl">Signal</span><span class="val">${sig_badge(r.trend)}</span></div>
    <div class="sheet-row"><span class="lbl">Pattern</span><span class="val">${r.pattern||'—'}</span></div>
    <div class="sheet-row"><span class="lbl">Days to Exp</span><span class="val">${r.days_to_exp||'—'}</span></div>
    <div class="sheet-row"><span class="lbl">Expiry</span><span class="val">${r.expiry||'—'}</span></div>
  `,r.symbol+' — Basis');
}
window.showBasisSheet=showBasisSheet;
window.renderBasis=renderBasis;

  </script>
</body>
